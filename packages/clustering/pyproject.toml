[project]
name = "prap-clustering"
version = "0.1.0a0"
description = "PRAP pipeline: cluster police-records files into incidents via a 3-tier regex+LLM+embedding cascade."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "prap-core",
    "jinja2>=3.1",
    "networkx>=3.0",
    "numpy>=1.24",
    "pandas>=2.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "scikit-learn>=1.3",
    "sentence-transformers>=2.2",
    "tiktoken>=0.7",
    "tqdm>=4.66",
    "typer>=0.12",
]

[project.scripts]
prap-clustering = "prap_clustering.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prap_clustering"]

[tool.hatch.build.targets.wheel.force-include]
"src/prap_clustering/prompts" = "prap_clustering/prompts"
"src/prap_clustering/configs" = "prap_clustering/configs"
