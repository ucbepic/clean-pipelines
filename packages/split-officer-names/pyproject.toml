[project]
name = "prap-split-officer-names"
version = "0.1.0a0"
description = "PRAP pipeline: clean, validate, and split officer-name strings extracted from police records."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "prap-core",
    "pandas>=2.0",
    "tqdm>=4.66",
    "typer>=0.12",
]

[project.scripts]
prap-split-officer-names = "prap_split_officer_names.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prap_split_officer_names"]

[tool.hatch.build.targets.wheel.force-include]
"src/prap_split_officer_names/prompts" = "prap_split_officer_names/prompts"
