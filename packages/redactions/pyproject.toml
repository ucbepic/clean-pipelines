[project]
name = "prap-redactions"
version = "0.1.0a0"
description = "PRAP pipeline: identify pages requiring redaction (sensitive persons, graphic imagery, DOB, cards, SSN)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "prap-core",
    "pandas>=2.0",
    "tiktoken>=0.7",
    "tqdm>=4.66",
    "typer>=0.12",
    "jinja2>=3.1",
    "fuzzywuzzy>=0.18",
    "python-Levenshtein>=0.25",
    "pillow>=10.0",
    "requests>=2.31",
    "azure-storage-blob>=12.19",
    "azure-core>=1.30",
]

[project.scripts]
prap-redactions = "prap_redactions.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prap_redactions"]

[tool.hatch.build.targets.wheel.force-include]
"src/prap_redactions/prompts" = "prap_redactions/prompts"
