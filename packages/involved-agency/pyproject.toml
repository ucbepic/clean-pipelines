[project]
name = "prap-involved-agency"
version = "0.1.0a0"
description = "PRAP pipeline: extract investigating / responding agencies from police case bundles."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "prap-core",
    "jinja2>=3.1",
    "pandas>=2.0",
    "pyarrow>=15.0",
    "pydantic>=2.0",
    "tiktoken>=0.7",
    "tqdm>=4.66",
    "typer>=0.12",
]

[project.scripts]
prap-involved-agency = "prap_involved_agency.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prap_involved_agency"]

[tool.hatch.build.targets.wheel.force-include]
"src/prap_involved_agency/prompts" = "prap_involved_agency/prompts"
