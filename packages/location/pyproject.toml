[project]
name = "prap-location"
version = "0.1.0a0"
description = "PRAP pipeline: extract the city where each police incident occurred (LLM-only)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "prap-core",
    "pandas>=2.0",
    "pyarrow>=14",
    "tqdm>=4.66",
    "typer>=0.12",
]

[project.scripts]
prap-location = "prap_location.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prap_location"]

[tool.hatch.build.targets.wheel.force-include]
"src/prap_location/prompts" = "prap_location/prompts"
"src/prap_location/targeted_filters" = "prap_location/targeted_filters"
