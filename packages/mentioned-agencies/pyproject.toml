[project]
name = "prap-mentioned-agencies"
version = "0.1.0a0"
description = "PRAP pipeline: extract law-enforcement agencies mentioned in police case documents."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "prap-core",
    "fuzzywuzzy>=0.18",
    "python-Levenshtein>=0.25",
    "tqdm>=4.66",
    "typer>=0.12",
]

[project.scripts]
prap-mentioned-agencies = "prap_mentioned_agencies.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prap_mentioned_agencies"]

[tool.hatch.build.targets.wheel.force-include]
"src/prap_mentioned_agencies/prompts" = "prap_mentioned_agencies/prompts"
