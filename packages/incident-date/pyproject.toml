[project]
name = "prap-incident-date"
version = "0.1.0a0"
description = "PRAP pipeline: extract incident dates from police case summaries."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "prap-core",
    "dateparser>=1.2",
    "pandas>=2.0",
    "pyarrow>=15.0",
    "tqdm>=4.66",
    "typer>=0.12",
]

[project.scripts]
prap-incident-date = "prap_incident_date.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prap_incident_date"]

[tool.hatch.build.targets.wheel.force-include]
"src/prap_incident_date/prompts" = "prap_incident_date/prompts"
