[project]
name = "prap-core"
version = "0.1.0a0"
description = "Shared library for PRAP pipelines: LLM, OCR, PDF, I/O, prompts, eval."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "litellm>=1.50",
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "python-dotenv>=1.0",
    "tenacity>=8.3",
    "diskcache>=5.6",
    "pypdf>=4.0",
]

[project.optional-dependencies]
ocr-tesseract = ["pytesseract>=0.3", "pdf2image>=1.17"]
ocr-unstructured = ["unstructured[pdf]>=0.15"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prap_core"]
